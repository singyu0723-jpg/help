<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>弟弟表達板</title>
<style>
  /* ===================================================================
     要改文字 / 選項：只改下面 <script> 最上面的 CATEGORIES 那一段
     永遠固定橫式 3×2。手機直放(方向鎖定)時自動旋轉成橫式並「鋪滿整個螢幕」
     用 dvh/dvw → 加入主畫面變 App(全螢幕)時會用真正整個螢幕，不預留網址列
     邊界(瀏海/底部 home條)用 env() 安全區自動避開
     若旋轉方向相反：把下面兩個 rotate(90deg) 改成 rotate(-90deg)
     =================================================================== */
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent;
      user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; }
  html, body { height:100%; width:100%; overflow:hidden; background:#000;
      font-family:"PingFang TC","Heiti TC","Microsoft JhengHei",system-ui,sans-serif; }

  #stage { position:fixed; transform-origin:center center; }

  /* 直放：旋轉成橫式，鋪滿整個螢幕（dvh/dvw = 真正可視範圍） */
  @media (orientation: portrait){
    #stage { top:50%; left:50%; width:100dvh; height:100dvw;
             transform:translate(-50%,-50%) rotate(90deg);
             /* 旋轉後：內容左=螢幕上(瀏海)、內容右=螢幕下(home條) */
             padding-top:    calc(env(safe-area-inset-right)  + 6px);
             padding-right:  calc(env(safe-area-inset-bottom) + 6px);
             padding-bottom: calc(env(safe-area-inset-left)   + 6px);
             padding-left:   calc(env(safe-area-inset-top)    + 6px); }
  }
  /* 橫放：正常方向，鋪滿整個螢幕 */
  @media (orientation: landscape){
    #stage { inset:0; width:auto; height:auto; transform:none;
             padding-top:    calc(env(safe-area-inset-top)    + 6px);
             padding-right:  calc(env(safe-area-inset-right)  + 6px);
             padding-bottom: calc(env(safe-area-inset-bottom) + 6px);
             padding-left:   calc(env(safe-area-inset-left)   + 6px); }
  }

  /* 永遠橫式 3×2 */
  #grid { height:100%; width:100%; display:grid;
          grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(2,1fr); gap:12px; }

  .cell { container-type:size; border-radius:24px; overflow:hidden;
          display:flex; align-items:center; justify-content:center; text-align:center;
          color:#fff; font-weight:900;
          transition:transform .04s ease, filter .04s ease, box-shadow .04s ease; }
  .cell > span { font-size:36cqmin; line-height:1.04; padding:6px; word-break:break-word; }
  .cell.empty { background:transparent; }
  .cell:not(.empty):active { transform:scale(0.95); filter:brightness(1.3); }
  /* 按下回饋：縮放 + 變亮 + 白色內框（無聲音） */
  .cell.press { transform:scale(0.92); filter:brightness(1.45);
                box-shadow:inset 0 0 0 10px #ffffff; }

  /* 六種固定位置顏色：位置固定→顏色固定，方便用顏色辨識 */
  .p0{background:#1f6feb} /* 藍 */
  .p1{background:#cf222e} /* 紅 */
  .p2{background:#1a7f37} /* 綠 */
  .p3{background:#bc4c00} /* 橘 */
  .p4{background:#8957e5} /* 紫 */
  .p5{background:#0a7ea4} /* 青 */
  .back{background:#57606a} /* 返回：灰 */
</style>
</head>
<body>
  <div id="stage"><div id="grid"></div></div>

<script>
/* ====================== 可自由修改的內容 ======================
   每個分類：name = 主畫面大按鈕文字，items = 點進去的 5 個選項
   想念出跟畫面不同的話：寫成 {t:"按鈕字", say:"要念出來的話"} */
const CATEGORIES = [
  { name:"生理",   items:["尿尿","大便","冷","熱","不舒服"] },
  { name:"不舒服", items:["頭痛","肚子痛","口腔","喉嚨","肢體"] },
  { name:"清潔",   items:["口腔","鼻子","耳朵","眼睛","下身"] },
  { name:"娛樂",   items:["新聞","棒球","卡通","音樂","休息"] },
  { name:"表達",   items:["對","不對","想","不想","晚一點"] },
];
/* ============================================================ */

const grid = document.getElementById('grid');

/* ---- 語音 (iPhone 內建 TTS) ---- */
let voice = null;
function pickVoice(){
  const vs = speechSynthesis.getVoices();
  voice = vs.find(v=>v.lang==='zh-TW') || vs.find(v=>/zh[-_]TW/i.test(v.lang))
       || vs.find(v=>/zh[-_]HK/i.test(v.lang)) || vs.find(v=>v.lang && v.lang.startsWith('zh')) || null;
}
pickVoice();
if (typeof speechSynthesis !== 'undefined') speechSynthesis.onvoiceschanged = pickVoice;
function speak(text){
  try{
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang='zh-TW'; u.rate=0.9; u.pitch=1; u.volume=1;
    if (voice) u.voice = voice;
    speechSynthesis.speak(u);
  }catch(e){}
}

/* ---- 觸控反饋（只有畫面，無聲音） ---- */
function feedback(el){
  el.classList.add('press');
  setTimeout(()=>el.classList.remove('press'), 180);
  if (navigator.vibrate) navigator.vibrate(40); /* Android 會震動；iOS 自動忽略 */
}

/* ---- 建立一格（文字包在 span，依格子大小縮放） ---- */
function makeCell(label, cls, onTap){
  const d = document.createElement('div');
  d.className = 'cell ' + cls;
  if (label){ const s=document.createElement('span'); s.textContent=label; d.appendChild(s); }
  if (onTap) d.addEventListener('click', ()=>onTap(d));
  return d;
}

/* ---- 主畫面：六格放分類，不足補空格 ---- */
function renderHome(){
  grid.innerHTML = '';
  for (let cell=0; cell<6; cell++){
    if (cell < CATEGORIES.length){
      const i = cell;
      grid.appendChild(makeCell(CATEGORIES[i].name, 'p'+i, (el)=>{
        feedback(el); speak(CATEGORIES[i].name);
        setTimeout(()=>renderCategory(i), 130);
      }));
    } else {
      grid.appendChild(makeCell('', 'empty', null));
    }
  }
}

/* ---- 分類頁：5 個選項 + 第 6 格返回 ---- */
function renderCategory(i){
  const cat = CATEGORIES[i];
  grid.innerHTML = '';
  cat.items.forEach((item, idx)=>{
    const text = typeof item==='string' ? item : item.t;
    const say  = typeof item==='string' ? item : (item.say || item.t);
    grid.appendChild(makeCell(text, 'p'+idx, (el)=>{ feedback(el); speak(say); }));
  });
  grid.appendChild(makeCell('返回', 'back', (el)=>{ feedback(el); renderHome(); }));
}

/* 解鎖 iOS 語音：第一次任何觸碰先暖機 */
document.body.addEventListener('touchstart', function warm(){
  try{ const u=new SpeechSynthesisUtterance(' '); u.volume=0; speechSynthesis.speak(u);}catch(e){}
  document.body.removeEventListener('touchstart', warm);
}, {once:true});

renderHome();
</script>
</body>
</html>
