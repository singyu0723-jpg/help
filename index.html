<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>弟弟表達板</title>
<style>
  /* ===================================================================
     要改文字 / 選項：只改下面 <script> 最上面的 CATEGORIES 那一段
     永遠固定橫式 3×2，鋪滿整個螢幕(由 JS 量真實像素，撐到底不留黑邊)
     手機直放(方向鎖定)時自動旋轉成橫式；加入主畫面變 App 也會滿版
     若旋轉方向相反：把下面 const ROTATE = 90 改成 -90
     =================================================================== */
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent;
      user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; }
  html, body { height:100%; width:100%; overflow:hidden; background:#000;
      font-family:"PingFang TC","Heiti TC","Microsoft JhengHei",system-ui,sans-serif; }

  /* 量測真實可視範圍用（永遠等於整個畫面） */
  #vp { position:fixed; inset:0; visibility:hidden; pointer-events:none; z-index:-1; }

  /* 舞台尺寸/位置/旋轉/留白都由 JS 設定 */
  #stage { position:fixed; }

  #grid { height:100%; width:100%; display:grid;
          grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(2,1fr); gap:12px; }

  .cell { container-type:size; border-radius:24px; overflow:hidden;
          display:flex; align-items:center; justify-content:center; text-align:center;
          color:#fff; font-weight:900;
          transition:transform .04s ease, filter .04s ease, box-shadow .04s ease; }
  .cell > span { font-size:36cqmin; line-height:1.04; padding:6px; word-break:break-word; }
  .cell.empty { background:transparent; }
  .cell:not(.empty):active { transform:scale(0.95); filter:brightness(1.3); }
  /* 按下回饋：縮放 + 變亮 + 白色內框（無聲音） */
  .cell.press { transform:scale(0.92); filter:brightness(1.45);
                box-shadow:inset 0 0 0 10px #ffffff; }

  /* 六種固定位置顏色：位置固定→顏色固定，方便用顏色辨識 */
  .p0{background:#1f6feb} /* 藍 */
  .p1{background:#cf222e} /* 紅 */
  .p2{background:#1a7f37} /* 綠 */
  .p3{background:#bc4c00} /* 橘 */
  .p4{background:#8957e5} /* 紫 */
  .p5{background:#0a7ea4} /* 青 */
  .back{background:#57606a} /* 返回：灰 */
</style>
</head>
<body>
  <div id="vp"></div>
  <div id="stage"><div id="grid"></div></div>

<script>
/* ====================== 可自由修改的內容 ======================
   每個分類：name = 主畫面大按鈕文字，items = 點進去的 5 個選項
   想念出跟畫面不同的話：寫成 {t:"按鈕字", say:"要念出來的話"} */
const CATEGORIES = [
  { name:"生理",   items:["尿尿","大便","冷","熱","不舒服"] },
  { name:"不舒服", items:["頭痛","肚子痛","口腔","喉嚨","肢體"] },
  { name:"清潔",   items:["口腔","鼻子","耳朵","眼睛","下身"] },
  { name:"娛樂",   items:["新聞","棒球","卡通","音樂","休息"] },
  { name:"表達",   items:["對","不對","想","不想","晚一點"] },
];
const ROTATE = 90; /* 方向相反就改成 -90 */
/* ============================================================ */

const vp    = document.getElementById('vp');
const stage = document.getElementById('stage');
const grid  = document.getElementById('grid');

/* ---- iOS 安全區（實體方向：直放時 t=瀏海, b=底部 home條） ---- */
function getInsets(){
  const p = document.createElement('div');
  p.style.cssText = 'position:fixed;visibility:hidden;pointer-events:none;'
    + 'padding-top:env(safe-area-inset-top);padding-right:env(safe-area-inset-right);'
    + 'padding-bottom:env(safe-area-inset-bottom);padding-left:env(safe-area-inset-left);';
  document.body.appendChild(p);
  const cs = getComputedStyle(p);
  const o = { t:parseFloat(cs.paddingTop)||0, r:parseFloat(cs.paddingRight)||0,
              b:parseFloat(cs.paddingBottom)||0, l:parseFloat(cs.paddingLeft)||0 };
  p.remove();
  return o;
}

/* ---- 量真實可視像素，把舞台撐成滿版（橫式 3×2） ---- */
function layout(){
  const r = vp.getBoundingClientRect();
  const de = document.documentElement;
  /* 取多來源最大值，避免某個 API 在 App 啟動瞬間回報過小而留黑邊 */
  const W = Math.round(Math.max(r.width,  window.innerWidth  || 0, de.clientWidth  || 0));
  const H = Math.round(Math.max(r.height, window.innerHeight || 0, de.clientHeight || 0));
  if (!W || !H) return;
  const ins = getInsets(), g = 8;
  if (W >= H){
    /* 視窗已是橫向 → 不旋轉 */
    stage.style.width  = W + 'px';
    stage.style.height = H + 'px';
    stage.style.left = '0px'; stage.style.top = '0px';
    stage.style.transform = 'none';
    stage.style.padding = (ins.t+g)+'px '+(ins.r+g)+'px '+(ins.b+g)+'px '+(ins.l+g)+'px';
  } else {
    /* 視窗直向 → 旋轉成橫式，舞台長短邊對調，撐滿整個畫面 */
    stage.style.width  = H + 'px';
    stage.style.height = W + 'px';
    stage.style.left = (W/2) + 'px';
    stage.style.top  = (H/2) + 'px';
    stage.style.transform = 'translate(-50%,-50%) rotate('+ROTATE+'deg)';
    /* 旋轉後：內容左=螢幕上(瀏海)=ins.t；內容右=螢幕下(home條)=ins.b */
    stage.style.padding = (ins.r+g)+'px '+(ins.b+g)+'px '+(ins.l+g)+'px '+(ins.t+g)+'px';
  }
}
/* 多次重算，確保 App 全螢幕/工具列穩定後也滿版 */
function relayout(){ requestAnimationFrame(layout); }
window.addEventListener('resize', relayout);
window.addEventListener('orientationchange', ()=>setTimeout(relayout, 250));
window.addEventListener('pageshow', relayout);
window.addEventListener('load', relayout);
if (window.visualViewport) window.visualViewport.addEventListener('resize', relayout);
[60, 300, 800, 1500, 2500].forEach(t=>setTimeout(layout, t));

/* ---- 語音 (iPhone 內建 TTS) ---- */
let voice = null;
function pickVoice(){
  const vs = speechSynthesis.getVoices();
  voice = vs.find(v=>v.lang==='zh-TW') || vs.find(v=>/zh[-_]TW/i.test(v.lang))
       || vs.find(v=>/zh[-_]HK/i.test(v.lang)) || vs.find(v=>v.lang && v.lang.startsWith('zh')) || null;
}
pickVoice();
if (typeof speechSynthesis !== 'undefined') speechSynthesis.onvoiceschanged = pickVoice;
function speak(text){
  try{
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang='zh-TW'; u.rate=0.9; u.pitch=1; u.volume=1;
    if (voice) u.voice = voice;
    speechSynthesis.speak(u);
  }catch(e){}
}

/* ---- 觸控反饋（只有畫面，無聲音） ---- */
function feedback(el){
  el.classList.add('press');
  setTimeout(()=>el.classList.remove('press'), 180);
  if (navigator.vibrate) navigator.vibrate(40); /* Android 會震動；iOS 自動忽略 */
}

/* ---- 建立一格（文字包在 span，依格子大小縮放） ---- */
function makeCell(label, cls, onTap){
  const d = document.createElement('div');
  d.className = 'cell ' + cls;
  if (label){ const s=document.createElement('span'); s.textContent=label; d.appendChild(s); }
  if (onTap) d.addEventListener('click', ()=>onTap(d));
  return d;
}

/* ---- 主畫面：六格放分類，不足補空格 ---- */
function renderHome(){
  grid.innerHTML = '';
  for (let cell=0; cell<6; cell++){
    if (cell < CATEGORIES.length){
      const i = cell;
      grid.appendChild(makeCell(CATEGORIES[i].name, 'p'+i, (el)=>{
        feedback(el); speak(CATEGORIES[i].name);
        setTimeout(()=>renderCategory(i), 130);
      }));
    } else {
      grid.appendChild(makeCell('', 'empty', null));
    }
  }
}

/* ---- 分類頁：5 個選項 + 第 6 格返回 ---- */
function renderCategory(i){
  const cat = CATEGORIES[i];
  grid.innerHTML = '';
  cat.items.forEach((item, idx)=>{
    const text = typeof item==='string' ? item : item.t;
    const say  = typeof item==='string' ? item : (item.say || item.t);
    grid.appendChild(makeCell(text, 'p'+idx, (el)=>{ feedback(el); speak(say); }));
  });
  grid.appendChild(makeCell('返回', 'back', (el)=>{ feedback(el); renderHome(); }));
}

/* 解鎖 iOS 語音：第一次任何觸碰先暖機 */
document.body.addEventListener('touchstart', function warm(){
  try{ const u=new SpeechSynthesisUtterance(' '); u.volume=0; speechSynthesis.speak(u);}catch(e){}
  document.body.removeEventListener('touchstart', warm);
}, {once:true});

renderHome();
layout();
</script>
</body>
</html>
