<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<title>弟弟表達板</title>
<style>
  /* ===================================================================
     要改文字/選項/位置：改下面 <script> 的 HOME 與 PAGES
     位置編號(左到右、上到下)：1 2 3 / 4 5 6（6=右下角，最好按）
     顏色依「位置」固定；返回固定在第3格、永遠灰色
     觸發：點一下、或手貼著按鈕停留(會持續重複念)，兩種都可
     永遠橫式 3×2 滿版；直放(方向鎖定)自動旋轉成橫式
     旋轉方向相反就把 const ROTATE = 90 改成 -90
     =================================================================== */
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent;
      user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; -webkit-user-drag:none; }
  html, body { height:100%; width:100%; overflow:hidden; background:#000; touch-action:none;
      font-family:"PingFang TC","Heiti TC","Microsoft JhengHei",system-ui,sans-serif; }

  #vp { position:fixed; inset:0; visibility:hidden; pointer-events:none; z-index:-1; }
  #stage { position:fixed; }

  #grid { height:100%; width:100%; display:grid;
          grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(2,1fr); gap:12px; }

  .cell { border-radius:24px; overflow:hidden;
          display:flex; align-items:center; justify-content:center; text-align:center;
          color:#fff; font-weight:900; touch-action:none;
          transition:transform .04s ease, filter .04s ease, box-shadow .04s ease; }
  .cell > span { font-size:var(--fs, 8vmin); line-height:1.04; padding:6px; word-break:break-word; }
  .cell.empty { background:transparent; }
  /* 觸摸期間持續亮（白色外框＋變亮），放開才消失 */
  .cell.on { transform:scale(0.97); filter:brightness(1.5);
             box-shadow:inset 0 0 0 12px #ffffff; }

  /* 六種位置顏色（位置固定→顏色固定） */
  .p0{background:#1f6feb} /* 藍 */
  .p1{background:#cf222e} /* 紅 */
  .p2{background:#1a7f37} /* 綠 */
  .p3{background:#bc4c00} /* 橘 */
  .p4{background:#8957e5} /* 紫 */
  .p5{background:#0a7ea4} /* 青 */
  .back{background:#57606a} /* 返回：灰 */
</style>
</head>
<body>
  <div id="vp"></div>
  <div id="stage"><div id="grid"></div></div>

<script>
/* ====================== 可自由修改的內容 ======================
   位置順序：[1, 2, 3, 4, 5, 6]（左到右、上到下，6=右下角）
   首頁 HOME：cat=點進子分頁的分類；say=直接念(不進子分頁) */
const HOME = [
  { t:"都不是", say:"都不是" },   /* 1 */
  { t:"娛樂",   cat:"娛樂"   },   /* 2 */
  { t:"表達",   cat:"表達"   },   /* 3 */
  { t:"不舒服", cat:"不舒服" },   /* 4 */
  { t:"清潔",   cat:"清潔"   },   /* 5 */
  { t:"生理",   cat:"生理"   },   /* 6 */
];

/* 子分頁：每頁 6 格，"返回" 為返回鍵（固定放第3格）。其餘點了會念出文字 */
const PAGES = {
  "生理":   ["冷",   "不舒服", "返回", "熱",   "大便", "尿尿"],
  "表達":   ["不想", "晚一點", "返回", "想",   "不是", "是"],
  "娛樂":   ["新聞", "棒球",   "返回", "卡通", "音樂", "想休息"],
  "不舒服": ["頭痛", "肚子痛", "返回", "口腔", "喉嚨", "肢體"],
  "清潔":   ["口腔", "鼻子",   "返回", "耳朵", "眼睛", "下身"],
};

const ROTATE = 90;          /* 方向相反改 -90 */
const GAP_MS = 200;         /* 手停留時，念完一個字後隔多久再念（越小越快） */
/* ============================================================ */

const vp    = document.getElementById('vp');
const stage = document.getElementById('stage');
const grid  = document.getElementById('grid');

/* ---- iOS 安全區 ---- */
function getInsets(){
  const p = document.createElement('div');
  p.style.cssText = 'position:fixed;visibility:hidden;pointer-events:none;'
    + 'padding-top:env(safe-area-inset-top);padding-right:env(safe-area-inset-right);'
    + 'padding-bottom:env(safe-area-inset-bottom);padding-left:env(safe-area-inset-left);';
  document.body.appendChild(p);
  const cs = getComputedStyle(p);
  const o = { t:parseFloat(cs.paddingTop)||0, r:parseFloat(cs.paddingRight)||0,
              b:parseFloat(cs.paddingBottom)||0, l:parseFloat(cs.paddingLeft)||0 };
  p.remove();
  return o;
}

/* ---- 量真實可視像素，舞台撐滿（橫式 3×2），算字體 ---- */
const GAP = 12;
function layout(){
  const r = vp.getBoundingClientRect();
  const de = document.documentElement;
  const W = Math.round(Math.max(r.width,  window.innerWidth  || 0, de.clientWidth  || 0));
  const H = Math.round(Math.max(r.height, window.innerHeight || 0, de.clientHeight || 0));
  if (!W || !H) return;
  const ins = getInsets(), g = 8;
  if (W >= H){
    stage.style.width = W+'px'; stage.style.height = H+'px';
    stage.style.left='0px'; stage.style.top='0px'; stage.style.transform='none';
    stage.style.padding = (ins.t+g)+'px '+(ins.r+g)+'px '+(ins.b+g)+'px '+(ins.l+g)+'px';
  } else {
    stage.style.width = H+'px'; stage.style.height = W+'px';
    stage.style.left = (W/2)+'px'; stage.style.top = (H/2)+'px';
    stage.style.transform = 'translate(-50%,-50%) rotate('+ROTATE+'deg)';
    stage.style.padding = (ins.r+g)+'px '+(ins.b+g)+'px '+(ins.l+g)+'px '+(ins.t+g)+'px';
  }
  const cw = grid.clientWidth, ch = grid.clientHeight;
  if (cw && ch){
    const cellW = (cw - 2*GAP)/3, cellH = (ch - 1*GAP)/2;
    const fs = Math.max(24, Math.floor(0.36 * Math.min(cellW, cellH)));
    de.style.setProperty('--fs', fs+'px');
  }
}
function relayout(){ requestAnimationFrame(layout); }
window.addEventListener('resize', relayout);
window.addEventListener('orientationchange', ()=>setTimeout(relayout, 250));
window.addEventListener('pageshow', relayout);
window.addEventListener('load', relayout);
if (window.visualViewport) window.visualViewport.addEventListener('resize', relayout);
[60, 300, 800, 1500, 2500].forEach(t=>setTimeout(layout, t));

/* ---- 語音 ---- */
const RATE = 1.0, PITCH = 1.0;   /* 語速/音高，要更慢可把 RATE 改 0.9 */
let voice = null;
function pickVoice(){
  const vs = speechSynthesis.getVoices();
  const tw = vs.filter(v=>/zh[-_]TW/i.test(v.lang) || v.lang==='zh-TW');
  voice = tw.find(v=>!/compact/i.test((v.voiceURI||'')+(v.name||'')))  /* 優先非 compact 的台灣中文 */
       || tw[0]
       || vs.find(v=>/zh[-_]CN/i.test(v.lang))                         /* 退路：普通話(非粵語) */
       || vs.find(v=>v.lang && v.lang.startsWith('zh'))
       || null;
}
pickVoice();
if (typeof speechSynthesis !== 'undefined') speechSynthesis.onvoiceschanged = pickVoice;

function makeUtter(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang='zh-TW'; u.rate=RATE; u.pitch=PITCH; u.volume=1;
  if (voice) u.voice = voice;
  return u;
}

/* iOS 語音解鎖：只有「放開/click」這類手勢能解鎖，按下(pointerdown)不行 */
let primed = false;
function primeOnce(){
  if (primed) return; primed = true;
  try{ const u = makeUtter('啊'); u.volume = 0; speechSynthesis.speak(u); }catch(e){}
}

function speak(text){
  try{
    if (speechSynthesis.speaking || speechSynthesis.pending) speechSynthesis.cancel();
    speechSynthesis.speak(makeUtter(text));
  }catch(e){}
}

/* ---- 建立一格 ---- */
function makeCell(label, cls, kind, payload){
  const d = document.createElement('div');
  d.className = 'cell ' + cls;
  if (label){ const s=document.createElement('span'); s.textContent=label; d.appendChild(s); }
  d._kind = kind || null;          /* 'speak' | 'cat' | 'back' | null */
  d._payload = payload;            /* speak→要念的字；cat→分類名 */
  return d;
}

/* ---- 組頁面 ---- */
function buildGrid(cells){
  grid.innerHTML = '';
  for (let i=0;i<6;i++){
    const c = cells[i];
    if (!c){ grid.appendChild(makeCell('', 'empty', null)); continue; }
    const cls = c.kind==='back' ? 'back' : ('p'+i);
    const payload = c.kind==='cat' ? c.cat : (c.kind==='speak' ? c.say : null);
    grid.appendChild(makeCell(c.label, cls, c.kind, payload));
  }
  layout();
}

function renderHome(){
  buildGrid(HOME.map(e => e.cat
    ? { label:e.t, kind:'cat', cat:e.cat }
    : { label:e.t, kind:'speak', say:(e.say||e.t) }));
}
function renderCategory(name){
  const items = PAGES[name] || [];
  buildGrid(items.map(it => it==='返回'
    ? { label:'返回', kind:'back' }
    : { label:it, kind:'speak', say:it }));
}

/* ================= 觸發：點擊 + 停留(重複念) =================
   - 手指/滑鼠按到按鈕 → 立刻觸發（不用放開）
   - 一直貼著 → 念完整個字後，間隔 GAP_MS 再念（用 onend 接續，不切字）
   - 滑到別的按鈕 → 換成那個按鈕
   - 進子分頁後短暫冷卻，避免手還貼著就誤觸 */
let activeCell = null, repeatTimer = null, loopToken = 0, cooldownUntil = 0;

/* 重複念：念完一個完整的字 → 間隔 GAP_MS → 再念（不會把字切掉） */
function repeatLoop(cell){
  if (activeCell !== cell) return;
  const myToken = ++loopToken;
  let advanced = false;
  const next = ()=>{
    if (advanced) return; advanced = true;
    if (activeCell !== cell || myToken !== loopToken) return;
    repeatTimer = setTimeout(()=>repeatLoop(cell), GAP_MS);
  };
  try{
    if (speechSynthesis.speaking || speechSynthesis.pending) speechSynthesis.cancel();
    const u = makeUtter(cell._payload);
    u.onend = next; u.onerror = next;
    speechSynthesis.speak(u);
    /* 安全網：萬一 onend 沒觸發，估算時間後接續 */
    setTimeout(next, 500 + cell._payload.length*350 + GAP_MS);
  }catch(e){ setTimeout(next, 700); }
}

function deactivate(){
  loopToken++;                               /* 讓進行中的迴圈失效 */
  if (repeatTimer){ clearTimeout(repeatTimer); repeatTimer=null; }
  if (activeCell){ activeCell.classList.remove('on'); }
  activeCell = null;
  /* 不取消正在念的字，讓它念完（快速點一下也聽得到） */
}
function go(fn){ cooldownUntil = Date.now()+450; deactivate(); fn(); }
function activate(cell){
  if (!cell || !cell._kind) return;
  if (Date.now() < cooldownUntil) return;
  if (cell === activeCell) return;
  deactivate();
  activeCell = cell;
  cell.classList.add('on');                  /* 觸摸期間持續亮 */
  if (navigator.vibrate) navigator.vibrate(35);
  if (cell._kind === 'speak'){ repeatLoop(cell); }
  else if (cell._kind === 'cat'){ speak(cell._payload); go(()=>renderCategory(cell._payload)); }
  else if (cell._kind === 'back'){ go(renderHome); }
}
function cellFromPoint(x,y){
  const el = document.elementFromPoint(x,y);
  return (el && el.closest) ? el.closest('.cell') : null;
}
document.addEventListener('pointerdown', e=>{ activate(cellFromPoint(e.clientX, e.clientY)); });
document.addEventListener('pointermove', e=>{
  const down = e.pointerType==='touch' ? true : (e.buttons>0);
  if (!down) return;
  activate(cellFromPoint(e.clientX, e.clientY));
});
/* 放開：用 release 手勢解鎖 iOS 語音；第一次點放補念一次讓首擊也出聲 */
function onUp(){
  if (!primed){
    const c = (activeCell && activeCell._kind==='speak') ? activeCell : null;
    primeOnce();
    if (c) speak(c._payload);
  }
  deactivate();
}
document.addEventListener('pointerup', onUp);
document.addEventListener('touchend', onUp);
document.addEventListener('click', primeOnce);
document.addEventListener('pointercancel', deactivate);

renderHome();
layout();
</script>
</body>
</html>
