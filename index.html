<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>弟弟表達板</title>
<style>
  /* ===================================================================
     要改文字 / 選項：只改下面 <script> 最上面的 CATEGORIES 那一段
     畫面是橫向 3×2 共六格。分類頁第六格固定是「返回」，每分類放 5 個選項
     默認橫向：手機直放時畫面自動旋轉成橫式；邊界(瀏海/白條)由 JS 精準避開
     =================================================================== */
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent;
      user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; }
  html, body { height:100%; width:100%; overflow:hidden; background:#000;
      font-family:"PingFang TC","Heiti TC","Microsoft JhengHei",system-ui,sans-serif; }

  /* 舞台尺寸與旋轉由 JS 設定（像素精準） */
  #stage { position:fixed; transform-origin:center center; }

  #grid { height:100%; width:100%; display:grid;
          grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(2,1fr); gap:14px; }
  .cell { border-radius:22px; display:flex; align-items:center; justify-content:center; text-align:center;
          color:#fff; font-weight:900; line-height:1.0; padding:4px; white-space:nowrap;
          font-size:15vmin;
          transition:transform .04s ease, filter .04s ease, box-shadow .04s ease; }
  .cell.empty { background:transparent; }
  .cell:not(.empty):active { transform:scale(0.95); filter:brightness(1.3); }
  /* 按下回饋：縮放 + 變亮 + 白色內框（無聲音） */
  .cell.press { transform:scale(0.9); filter:brightness(1.45);
                box-shadow:inset 0 0 0 10px #ffffff; }

  /* 六種固定位置顏色：位置固定→顏色固定，方便用顏色辨識 */
  .p0{background:#1f6feb} /* 藍 */
  .p1{background:#cf222e} /* 紅 */
  .p2{background:#1a7f37} /* 綠 */
  .p3{background:#bc4c00} /* 橘 */
  .p4{background:#8957e5} /* 紫 */
  .p5{background:#0a7ea4} /* 青 */
  .back{background:#57606a} /* 返回：灰 */
</style>
</head>
<body>
  <div id="stage"><div id="grid"></div></div>

<script>
/* ====================== 可自由修改的內容 ======================
   每個分類：name = 主畫面大按鈕文字，items = 點進去的 5 個選項
   想念出跟畫面不同的話：寫成 {t:"按鈕字", say:"要念出來的話"} */
const CATEGORIES = [
  { name:"生理",   items:["尿尿","大便","冷","熱","不舒服"] },
  { name:"不舒服", items:["頭痛","肚子痛","口腔","喉嚨","肢體"] },
  { name:"清潔",   items:["口腔","鼻子","耳朵","眼睛","下身"] },
  { name:"娛樂",   items:["新聞","棒球","卡通","音樂","休息"] },
  { name:"表達",   items:["對","不對","想","不想","晚一點"] },
];
/* ============================================================ */

const stage = document.getElementById('stage');
const grid  = document.getElementById('grid');

/* ---- 讀取 iOS 安全區數值（實體方向：直放時 t=瀏海, b=底部白條） ---- */
function getInsets(){
  const p = document.createElement('div');
  p.style.cssText = 'position:fixed;visibility:hidden;pointer-events:none;'
    + 'padding-top:env(safe-area-inset-top);padding-right:env(safe-area-inset-right);'
    + 'padding-bottom:env(safe-area-inset-bottom);padding-left:env(safe-area-inset-left);';
  document.body.appendChild(p);
  const cs = getComputedStyle(p);
  const o = { t:parseFloat(cs.paddingTop)||0, r:parseFloat(cs.paddingRight)||0,
              b:parseFloat(cs.paddingBottom)||0, l:parseFloat(cs.paddingLeft)||0 };
  p.remove();
  return o;
}

/* ---- 依方向設定舞台尺寸、旋轉、與安全留白（像素精準） ---- */
function layout(){
  const w = window.innerWidth, h = window.innerHeight, ins = getInsets(), gap = 10;
  if (h >= w){
    /* 直放 → 旋轉 90° 變橫式。舞台用螢幕長短邊對調 */
    stage.style.width  = h + 'px';
    stage.style.height = w + 'px';
    stage.style.left   = (w/2) + 'px';
    stage.style.top    = (h/2) + 'px';
    stage.style.transform = 'translate(-50%,-50%) rotate(90deg)';
    /* 旋轉後對應：內容左=螢幕上(瀏海)=ins.t；內容右=螢幕下(白條)=ins.b
       padding 順序：上 右 下 左 */
    stage.style.padding = (ins.r+gap)+'px '+(ins.b+gap)+'px '+(ins.l+gap)+'px '+(ins.t+gap)+'px';
  } else {
    /* 橫放 → 正常方向 */
    stage.style.width  = w + 'px';
    stage.style.height = h + 'px';
    stage.style.left = '0px';
    stage.style.top  = '0px';
    stage.style.transform = 'none';
    stage.style.padding = (ins.t+gap)+'px '+(ins.r+gap)+'px '+(ins.b+gap)+'px '+(ins.l+gap)+'px';
  }
}
window.addEventListener('resize', layout);
window.addEventListener('orientationchange', ()=>setTimeout(layout, 250));

/* ---- 語音 (iPhone 內建 TTS) ---- */
let voice = null;
function pickVoice(){
  const vs = speechSynthesis.getVoices();
  voice = vs.find(v=>v.lang==='zh-TW') || vs.find(v=>/zh[-_]TW/i.test(v.lang))
       || vs.find(v=>/zh[-_]HK/i.test(v.lang)) || vs.find(v=>v.lang && v.lang.startsWith('zh')) || null;
}
pickVoice();
if (typeof speechSynthesis !== 'undefined') speechSynthesis.onvoiceschanged = pickVoice;
function speak(text){
  try{
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang='zh-TW'; u.rate=0.9; u.pitch=1; u.volume=1;
    if (voice) u.voice = voice;
    speechSynthesis.speak(u);
  }catch(e){}
}

/* ---- 觸控反饋（只有畫面，無聲音） ---- */
function feedback(el){
  el.classList.add('press');
  setTimeout(()=>el.classList.remove('press'), 180);
  if (navigator.vibrate) navigator.vibrate(40); /* Android 會震動；iOS 自動忽略 */
}

/* ---- 建立一格 ---- */
function makeCell(label, cls, onTap){
  const d = document.createElement('div');
  d.className = 'cell ' + cls;
  if (label) d.textContent = label;
  if (onTap) d.addEventListener('click', ()=>onTap(d));
  return d;
}

/* ---- 主畫面：六格放分類，不足補空格 ---- */
function renderHome(){
  grid.innerHTML = '';
  for (let cell=0; cell<6; cell++){
    if (cell < CATEGORIES.length){
      const i = cell;
      grid.appendChild(makeCell(CATEGORIES[i].name, 'p'+i, (el)=>{
        feedback(el); speak(CATEGORIES[i].name);
        setTimeout(()=>renderCategory(i), 130);
      }));
    } else {
      grid.appendChild(makeCell('', 'empty', null));
    }
  }
}

/* ---- 分類頁：5 個選項 + 第 6 格返回 ---- */
function renderCategory(i){
  const cat = CATEGORIES[i];
  grid.innerHTML = '';
  cat.items.forEach((item, idx)=>{
    const text = typeof item==='string' ? item : item.t;
    const say  = typeof item==='string' ? item : (item.say || item.t);
    grid.appendChild(makeCell(text, 'p'+idx, (el)=>{ feedback(el); speak(say); }));
  });
  grid.appendChild(makeCell('返回', 'back', (el)=>{ feedback(el); renderHome(); }));
}

/* 解鎖 iOS 語音：第一次任何觸碰先暖機 */
document.body.addEventListener('touchstart', function warm(){
  try{ const u=new SpeechSynthesisUtterance(' '); u.volume=0; speechSynthesis.speak(u);}catch(e){}
  document.body.removeEventListener('touchstart', warm);
}, {once:true});

layout();
renderHome();
</script>
</body>
</html>
